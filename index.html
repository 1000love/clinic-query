<html lang="zh-TW">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1a2e45;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-icon { font-size: 48px; line-height: 1; margin-bottom: 8px; }
    .brand h1 { font-size: 22px; font-weight: 700; color: #1a6b3c; letter-spacing: 1px; }
    .brand p  { font-size: 13px; color: #6b7a8d; margin-top: 4px; }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 36px 40px;
      width: 100%;
      max-width: 480px;
    }
    .card h2 {
      font-size: 16px; font-weight: 700; margin-bottom: 20px;
      color: #1a2e45; display: flex; align-items: center; gap: 8px;
    }
    .card h2 span.icon { font-size: 20px; }

    label { display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 6px; }

    input[type="password"], input[type="text"] {
      width: 100%; padding: 11px 40px 11px 14px;
      border: 1.5px solid #d1d9e0; border-radius: 8px;
      font-size: 15px; font-family: inherit;
      transition: border-color .2s, box-shadow .2s;
      outline: none; color: #1a2e45;
    }
    input:focus { border-color: #2d8a5e; box-shadow: 0 0 0 3px rgba(45,138,94,.15); }


    .btn {
      margin-top: 16px; width: 100%; padding: 12px;
      background: #2d8a5e; color: #fff;
      font-size: 15px; font-weight: 700; border: none;
      border-radius: 8px; cursor: pointer; letter-spacing: .5px;
      transition: background .2s, transform .1s;
    }
    .btn:hover  { background: #236e4a; }
    .btn:active { transform: scale(.98); }

    .msg {
      margin-top: 14px; padding: 10px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 500; display: none;
    }
    .msg.error   { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6c6; }
    .msg.info    { background: #fffbe6; color: #7d6200; border: 1px solid #ffe58f; }

    /* 結果卡片 */
    #result-card { display: none; max-width: 560px; }

    .clinic-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; flex-wrap: wrap;
      gap: 8px; margin-bottom: 24px;
      padding-bottom: 16px; border-bottom: 1.5px solid #e8ecf0;
    }
    .clinic-name     { font-size: 20px; font-weight: 800; color: #1a6b3c; }
    .clinic-location { font-size: 13px; color: #6b7a8d; margin-top: 4px; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: #e8f5ee; color: #1a6b3c;
      font-size: 12px; font-weight: 600;
      padding: 4px 10px; border-radius: 20px;
    }

    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;
    }
    .stat-box {
      background: #f7faf8; border: 1px solid #e0ece6;
      border-radius: 10px; padding: 14px 10px; text-align: center;
    }
    .stat-box .stat-num   { font-size: 28px; font-weight: 800; color: #2d8a5e; line-height: 1; }
    .stat-box .stat-label { font-size: 11px; color: #6b7a8d; margin-top: 5px; line-height: 1.4; }
    .stat-box.pending .stat-num   { color: #aaa; font-size: 18px; }
    .stat-box.pending .stat-label { color: #bbb; }

    .ratio-section { margin-top: 4px; }
    .ratio-section h3 { font-size: 13px; font-weight: 700; color: #4a5568; margin-bottom: 10px; }
    .ratio-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .ratio-row label { width: 90px; font-size: 12px; color: #6b7a8d; margin: 0; flex-shrink: 0; }
    .ratio-bar-wrap { flex: 1; background: #e8ecf0; border-radius: 100px; height: 10px; overflow: hidden; }
    .ratio-bar { height: 100%; border-radius: 100px; background: linear-gradient(90deg, #2d8a5e, #4eca88); transition: width .8s ease; min-width: 2px; }
    .ratio-val { font-size: 13px; font-weight: 700; color: #2d8a5e; width: 48px; text-align: right; }

    .btn-ghost {
      margin-top: 20px; width: 100%; padding: 10px;
      background: transparent; color: #2d8a5e;
      font-size: 14px; font-weight: 600;
      border: 1.5px solid #2d8a5e; border-radius: 8px;
      cursor: pointer; transition: background .2s;
    }
    .btn-ghost:hover { background: #f0fff6; }

    footer { margin-top: 28px; font-size: 12px; color: #a0aab4; text-align: center; }

    @media (max-width: 480px) {
      .card { padding: 28px 22px; }
    }
  </style>

    function checkPassword() {
      const val = document.getElementById("pwd-input").value.trim();
      if (val === CORRECT_PASSWORD) {
        document.getElementById("login-card").style.display = "none";
        document.getElementById("search-card").style.display = "block";
        setTimeout(() => document.getElementById("clinic-input").focus(), 100);
      } else {
        document.getElementById("pwd-error").style.display = "block";
        document.getElementById("pwd-input").value = "";
        document.getElementById("pwd-input").focus();
      }
    }
    document.getElementById("pwd-input")
      .addEventListener("keydown", e => { if (e.key === "Enter") checkPassword(); });

    function searchClinic() {
      document.getElementById("not-found").style.display = "none";
      const query = document.getElementById("clinic-input").value.trim();
      if (!query) { document.getElementById("clinic-input").focus(); return; }

      // 正規化：去空白、小寫
      const normalize = s => s.replace(/\s/g, "").toLowerCase();
      const q = normalize(query);
      const found = CLINIC_DATA.find(r => {
        const name = normalize(r["診所名稱"] || "");
        // 完全符合、或診所名稱包含輸入字串、或補「診所」後完全符合
        return name === q || name.includes(q) || name === q + "診所";
      });

      if (!found) {
        document.getElementById("not-found").style.display = "block";
        return;
      }
      renderResult(found);
    }

    function renderResult(r) {
      document.getElementById("search-card").style.display = "none";
      document.getElementById("result-card").style.display = "block";

      document.getElementById("res-name").textContent     = r["診所名稱"] || "—";
      document.getElementById("res-location").textContent = (r["縣市"] || "") + "　" + (r["區域"] || "");
      document.getElementById("res-enrolled").textContent = fmt(r["累積參加人數"]);
      document.getElementById("res-checked").textContent  = fmt(r["累積完成檢查並領蔬果券人數"]);

      // 指標改善 2026 尚未統計
      document.getElementById("res-improved").textContent = "—";

      const cityRatio     = parseFloat(r["該縣市占比"]) || 0;
      const nationalRatio = parseFloat(r["全國占比"])   || 0;

      document.getElementById("res-city-ratio").textContent     = cityRatio.toFixed(2) + "%";
      document.getElementById("res-national-ratio").textContent = nationalRatio.toFixed(2) + "%";

      setTimeout(() => {
        document.getElementById("bar-city").style.width     = Math.min(cityRatio, 100)     + "%";
        document.getElementById("bar-national").style.width = Math.min(nationalRatio * 5, 100) + "%";
      }, 80);
    }

    function fmt(v) {
      const n = parseInt(v, 10);
      return isNaN(n) ? "—" : n.toLocaleString();
    }

    function resetSearch() {
      document.getElementById("result-card").style.display = "none";
      document.getElementById("search-card").style.display = "block";
      document.getElementById("clinic-input").value = "";
      document.getElementById("bar-city").style.width = "0%";
      document.getElementById("bar-national").style.width = "0%";
      document.getElementById("not-found").style.display = "none";
      document.getElementById("clinic-input").focus();
    }
  </script>
